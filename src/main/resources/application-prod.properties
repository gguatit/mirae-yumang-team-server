# ==========================================
# 운영 환경 설정 (Production)
# ==========================================
# 실행: java -jar app.jar --spring.profiles.active=prod

# 데이터베이스 설정 (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/starlog?useSSL=true&requireSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ⚠️ 환경변수 DB_USERNAME, DB_PASSWORD 설정 권장
# export DB_USERNAME=your_username
# export DB_PASSWORD=your_secure_password

# JPA 설정 (MySQL)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate
# ⚠️ 최초 배포 시에만 update 사용, 이후 반드시 validate로 유지

# MySQL 성능 최적화
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# H2 Console (운영 환경에서는 비활성화)
spring.h2.console.enabled=false

# 로그 레벨 (운영: INFO 이상만)
logging.level.com.example.demo=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=ERROR

# 파일 업로드 경로 (운영)
file.upload-dir=/home/kalpha/starlog/upload/

# 세션 타임아웃 (운영: 길게)
server.servlet.session.timeout=60m

# 쿠키 보안 설정 (HTTPS 사용 시 활성화)
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# 프록시(Cloudflare/Nginx) 신뢰 — X-Forwarded-Proto 헤더를 신뢰해서 HTTPS로 인식
# 이게 없으면 Spring은 HTTP로 응답/redirect → Mixed Content 발생
server.forward-headers-strategy=framework
server.tomcat.remoteip.protocol-header=X-Forwarded-Proto
server.tomcat.remoteip.remote-ip-header=X-Forwarded-For

# Thymeleaf 캐시 활성화 (성능 향상)
spring.thymeleaf.cache=true

# 서버 포트 (필요시 변경)
server.port=8090

# 에러 페이지 (상세 정보 숨김)
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Cloudflare Turnstile (보안 키 — 환경 변수로 설정 권장)
turnstile.secret.key=${TURNSTILE_SECRET_KEY}

# GitHub OAuth2 (운영)
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.redirect-uri=https://starlog.c01.kr/login/oauth2/code/github
