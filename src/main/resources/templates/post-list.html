<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="stylesheet" href="/static/css/post-list.css">
</head>

<body>
    <div class="navbar">
        <a href="/home" class="navbar-brand">STARLOG</a>
        <div class="navbar-menu">
            <a href="/posts">게시판</a>
            <a th:if="${username}" href="/mypage" th:text="${username} + '님'"></a>
            <form th:if="${username}" th:action="@{/auth/logout}" method="post" style="display:inline;">
                <button type="submit"
                    style="background:none; border:none; color:inherit; cursor:pointer; font:inherit; padding:0;">로그아웃</button>
            </form>
            <a th:unless="${username}" href="/auth/login">로그인</a>
        </div>
    </div>

    <div class="container">

        <div class="community-header">
            <img src="/static/images/STARLOG (3).png" alt="">
            <div class="titlebox">
                <h1>학교 커뮤니티</h1>
                <span>학생들의 작은 이야기들이 모이는 곳</span>
                <form class="search-box" action="/posts" method="get" id="searchForm">
                    <input type="search" id="searchInput" name="keyword"
                        th:value="${keyword}"
                        placeholder="게시글 검색 (초성 검색 지원, 예: ㅅㄱ)"
                        autocomplete="off" />
                    <button type="submit">검색</button>
                    <a th:if="${!#strings.isEmpty(keyword)}" href="/posts" class="search-clear">✕ 초기화</a>
                </form>
            </div>
        </div>




        <div class="page-header">
            <div>
                <div class="post-count">
                    <span th:if="${!#strings.isEmpty(keyword)}">
                        &lsquo;<strong th:text="${keyword}"></strong>&rsquo; 검색 결과:
                    </span>
                    총 <span th:text="${posts.size()}" class="post-count-v"></span>개의 게시글
                </div>
            </div>

            <div class="post-main">




                <div class="post-table">
                    <!-- 게시글 목록 테이블 -->
                    <table th:if="${posts.size() > 0}">
                        <thead>
                            <tr>
                                <th class="col-id">번호</th>
                                <th class="col-title">제목</th>
                                <th class="col-author">작성자</th>
                                <th class="col-date">날짜</th>
                                <th class="col-views">조회수</th>
                                <th class="col-likes">추천</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="post, iterStat : ${posts}"
                                th:onclick="|location.href='@{/posts/{id}(id=${post.id})}'|" style="cursor:pointer;">
                                <td class="col-id" th:text="${iterStat.count}"></td>
                                <td class="col-title">
                                    <a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}"
                                        class="post-title"></a>
                                </td>
                                <td class="col-author" th:text="${post.author}"></td>
                                <td class="col-date" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">
                                </td>
                                <td class="col-views" th:text="${post.viewCount} ?: 0"></td>
                                <td class="col-likes" th:text="${post.likeCount} ?: 0"></td>
                            </tr>
                        </tbody>
                    </table>

                    <!-- 게시글이 없을 때 -->
                    <div class="empty-message" th:unless="${posts.size() > 0}">
                        아직 게시글이 없습니다.
                    </div>

                </div>
                <div class="bastpost-main">

                    <a th:if="${username}" href="/posts/write" class="btn">글쓰기</a>
                    <a th:unless="${username}" href="/auth/login" class="btn">로그인 후 글쓰기</a>

                    <div class="bastpost">
                        <div class="tmp">
                            <h3 class="best-title">인기 게시글 </h3>
                            <span class="title-sub">(추천수)</span>
                        </div>
                        <ul class="best-list">
                            <li class="best-item" th:each="post : ${bestPosts}">
                                <a th:href="@{/posts/{id}(id=${post.id})}" class="best-link">
                                    <div class="best-text">
                                        <span class="best-nickname" th:text="${post.user.username}">user1</span>
                                        <p class="best-content" th:text="${post.title}">인기 게시글 제목</p>
                                    </div>
                                    <span class="best-likes" th:text="${post.likeCount} ?: 0">0</span>
                                </a>
                            </li>

                            <li class="best-item" th:if="${#lists.isEmpty(bestPosts)}">
                                <p class="best-content" style="text-align: center; color: #9DB2F5;">인기 게시글이 없습니다.</p>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
    <div class="pagination">
        <button class="page-btn" data-page="prev">이전</button>
        <span class="page-info">1 / 1</span>
        <button class="page-btn" data-page="next">다음</button>
    </div>
</body>
<script>
    // ─────────────────────────────────────────────
    // es-hangul: getChoseong 인라인 구현
    // 출처: https://github.com/toss/es-hangul (MIT)
    // ─────────────────────────────────────────────
    const CHOSEONGS = [
        'ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ',
        'ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'
    ];

    function getChoseong(word) {
        return [...word].map(char => {
            const code = char.charCodeAt(0);
            if (code >= 0xAC00 && code <= 0xD7A3) {
                return CHOSEONGS[Math.floor((code - 0xAC00) / 588)];
            }
            return char;
        }).join('');
    }

    // 검색 매칭: 일반 포함 검색 + 초성 검색
    function matchesQuery(text, query) {
        if (!query) return true;
        const lower = text.toLowerCase();
        const q = query.toLowerCase();
        if (lower.includes(q)) return true;
        // 쿼리가 자음(초성)으로만 구성된 경우 초성 검색
        if (/^[ㄱ-ㅎ\s]+$/.test(query)) {
            return getChoseong(text).includes(query);
        }
        return false;
    }

    // ─────────────────────────────────────────────
    // 페이지네이션 + 실시간 초성 검색
    // ─────────────────────────────────────────────
    const postsPerPage = 10;
    let currentPage = 1;

    const allRows = Array.from(document.querySelectorAll('.post-table tbody tr'));
    const pageInfo = document.querySelector('.page-info');
    const searchInput = document.getElementById('searchInput');

    function getTotalPages(filtered) {
        return Math.max(1, Math.ceil(filtered.length / postsPerPage));
    }

    function getFilteredRows() {
        const query = searchInput ? searchInput.value.trim() : '';
        if (!query) return allRows;
        return allRows.filter(row => {
            const titleEl = row.querySelector('.col-title');
            const authorEl = row.querySelector('.col-author');
            const title = titleEl ? titleEl.textContent.trim() : '';
            const author = authorEl ? authorEl.textContent.trim() : '';
            return matchesQuery(title, query) || matchesQuery(author, query);
        });
    }

    function showPage(page) {
        const filtered = getFilteredRows();
        const total = getTotalPages(filtered);
        currentPage = Math.max(1, Math.min(page, total));

        const start = (currentPage - 1) * postsPerPage;
        const end = currentPage * postsPerPage;

        // 모든 행 숨기고
        allRows.forEach(row => row.style.display = 'none');
        // 현재 페이지 해당 행만 표시
        filtered.slice(start, end).forEach(row => row.style.display = '');

        pageInfo.textContent = `${currentPage} / ${total}`;

        // 빈 메시지 처리
        const emptyMsg = document.querySelector('.empty-message');
        if (emptyMsg) {
            emptyMsg.style.display = filtered.length === 0 ? '' : 'none';
        }
    }

    // 초기 화면
    showPage(1);

    // 페이지 버튼
    document.querySelectorAll('.page-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const filtered = getFilteredRows();
            const total = getTotalPages(filtered);
            if (btn.dataset.page === 'prev' && currentPage > 1) {
                showPage(currentPage - 1);
            } else if (btn.dataset.page === 'next' && currentPage < total) {
                showPage(currentPage + 1);
            }
        });
    });

    // 실시간 초성 검색 (클라이언트 필터링)
    if (searchInput) {
        searchInput.addEventListener('input', () => {
            currentPage = 1;
            showPage(1);
        });
    }
</script>

</html>
