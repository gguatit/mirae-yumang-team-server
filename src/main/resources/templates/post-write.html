<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <link rel="icon" type="image/png" href="/static/images/logo-rounded.png">
  <title>글쓰기</title>
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/school.css">
  <link rel="stylesheet" href="/static/css/post-write.css">
</head>

<body>
  <header class="school-header">
    <div class="wrap">
      <div class="header-top">
        <a href="/home" class="header-logo">STARLOG</a>
        <nav class="header-nav">
          <a href="/posts" class="active">학교 커뮤니티</a>
          <a href="https://kalpha.c01.kr">오늘의 운세</a>
          <a href="/school">오늘의 학교</a>
        </nav>
        <div class="header-menu">
          <div th:if="${username}">
            <a href="/mypage" th:text="${username} + '님'"></a>
            <form th:action="@{/auth/logout}" method="post" style="display:inline;">
              <button type="submit" class="logout-btn">로그아웃</button>
            </form>
          </div>
          <div th:unless="${username}">
            <a href="/auth/login">로그인</a>
            <a href="/auth/register">회원가입</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="write-box">

      <div th:if="${error}" class="error-message">
        <span th:text="${error}"></span>
      </div>

      <form th:action="@{/posts/write}" method="post" enctype="multipart/form-data">

        <div class="form-group">
          <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required>
        </div>

        <div class="form-group">
          <textarea id="content" name="content" placeholder="나누고 싶은 이야기를 적어보세요." required></textarea>
        </div>

        <div class="tmp">
          <div class="form-group">
            <label style="color: #C7D7F9; display: block; margin-bottom: 10px;">파일 첨부 (최대 250MB)</label>
            <input type="file" name="imageFile" multiple style="color: #C7D7F9;">
          </div>

          <div class="upload-progress" id="uploadProgress" hidden>
            <div class="upload-track">
              <div class="upload-fill" id="uploadFill"></div>
            </div>
            <span class="upload-pct" id="uploadPct">0%</span>
            <span class="upload-status" id="uploadStatus">업로드 준비 중...</span>
          </div>

          <div class="button-group">
            <button type="submit" id="submitBtn">작성완료</button>
            <a href="/posts" class="btn-cancel">취소</a>
          </div>
        </div>

      </form>
    </div>
  </div>

  </div>
  <script src="/static/js/upload-progress.js"></script>
  <script>
    if (typeof attachUploadProgress === 'function') {
      attachUploadProgress('form[action$="/posts/write"]', 'uploadProgress', 'submitBtn');
    }
  </script>
</body>

</html>
