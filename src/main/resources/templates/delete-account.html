<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원 탈퇴 - STARLOG</title>
  <link rel="stylesheet" href="/static/css/reset.css">
  <style>
    body {
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
    }

    header {
      width: 100%;
      padding: 16px 32px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    header a {
      text-decoration: none;
      color: #222;
    }

    .delete-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      margin-top: 60px;
    }

    .delete-container h2 {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #222;
    }

    .delete-warning {
      background: #fff4f4;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      color: #b91c1c;
      font-size: 14px;
      line-height: 1.6;
    }

    .delete-warning ul {
      margin: 8px 0 0 16px;
      padding: 0;
    }

    .delete-warning ul li {
      list-style: disc;
      margin-bottom: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    .form-group input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .form-group input[type="password"]:focus {
      outline: none;
      border-color: #e05;
    }

    .error-message {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      color: #b91c1c;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .btn-danger {
      width: 100%;
      padding: 13px;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .btn-cancel {
      display: block;
      width: 100%;
      padding: 13px;
      background: #f3f4f6;
      color: #374151;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-top: 10px;
      box-sizing: border-box;
      transition: background 0.2s;
    }

    .btn-cancel:hover {
      background: #e5e7eb;
    }
  </style>
</head>

<body>

  <header><a href="/home">STARLOG</a></header>

  <div class="delete-container">
    <h2>회원 탈퇴</h2>

    <div class="delete-warning">
      <strong>⚠️ 탈퇴 전 꼭 확인해 주세요</strong>
      <ul>
        <li>탈퇴 시 작성하신 게시글, 댓글이 모두 삭제됩니다.</li>
        <li>삭제된 데이터는 복구할 수 없습니다.</li>
        <li>탈퇴 후 동일 아이디로 재가입할 수 없을 수 있습니다.</li>
      </ul>
    </div>

    <!-- 에러 메시지 -->
    <div th:if="${error}" class="error-message" th:text="${error}"></div>

    <form th:action="@{/auth/delete-account}" method="post">
      <div class="form-group">
        <label for="password">비밀번호 확인</label>
        <input type="password" id="password" name="password"
               placeholder="현재 비밀번호를 입력하세요" required autofocus>
      </div>

      <button type="submit" class="btn-danger"
              onclick="return confirm('정말로 탈퇴하시겠습니까? 모든 데이터가 삭제되며 복구할 수 없습니다.')">
        회원 탈퇴
      </button>
    </form>

    <a href="/mypage" class="btn-cancel">취소</a>
  </div>

</body>

</html>
