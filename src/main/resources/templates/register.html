<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/static/images/logo-rounded.png">
  <link rel="preconnect" href="https://challenges.cloudflare.com" />
  <title>회원가입</title>
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/register.css?v=20260313-1">
</head>

<body>

  <header><a href="/home">STARLOG</a></header>


  <div class="wrap">
    <div class="centerbox">
      <div class="leftbox">
        <img src="/static/images/로그인 페이지 이미지.png" alt="">
      </div>

      <div class="rightbox">
        <!-- LOGO -->

        <a href="login.html" class="starlog">STARLOG</a>

        <div class="register-container">

          <div th:if="${error}" class="error-message">
            <span th:text="${error}"></span>
          </div>

          <form th:action="@{/auth/register}" method="post">
            <div class="form-group">
              <label for="username"></label>
              <input type="text" id="username" name="username" placeholder="아이디 (4자 이상)" required minlength="4">
            </div>

            <div class="form-group">
              <label for="password"></label>
              <input type="password" id="password" name="password" placeholder="비밀번호 (4자 이상)" required minlength="4">
            </div>

            <div class="form-group">
              <label for="email"></label>
              <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>

            <div class="cf-turnstile"
                 th:data-sitekey="${turnstileSiteKey}"
                 data-theme="light"
                 data-size="normal"></div>

            <button type="submit">회원가입</button>
          </form>

          <div class="link-group">
            <a href="/auth/login">이미 계정이 있으신가요? 로그인</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>

</html>
