# ==========================================
# STARLOG - 공통 설정
# ==========================================
# 환경별 설정 파일:
# - application-dev.properties (개발)
# - application-prod.properties (운영)
#
# 실행 예시:
# 개발: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# 운영: java -jar app.jar --spring.profiles.active=prod
# ==========================================

spring.application.name=demo

# 활성 프로필 설정 (기본값: 없음)
# IDE나 명령줄에서 지정하지 않으면 아래 값 사용
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# MVC 정적 리소스 경로
spring.mvc.static-path-pattern=/static/**

# 서버 포트
server.port=8090

# 데이터베이스 설정 (H2 - 기본값, dev 프로필에서 사용)
# prod 프로필 사용 시 MySQL로 자동 전환됨
spring.datasource.url=jdbc:h2:file:~/starlog-db/db;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA 설정
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 세션 설정
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict

# Thymeleaf 템플릿 설정
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# H2 Console (개발 환경에서만 사용 권장)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# 파일 업로드 설정
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 파일 저장 경로 (환경변수로 설정 가능)
file.upload-dir=${FILE_UPLOAD_DIR:~/starlog/upload/}

# Cloudflare Turnstile (사이트 키 — 클라이언트 공개 키)
turnstile.site.key=0x4AAAAAADCFFGwuusxdawOs


